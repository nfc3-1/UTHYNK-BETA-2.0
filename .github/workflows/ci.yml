name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
      SUPABASE_SERVICE_ROLE_KEY: service-role-ci-placeholder
      AUTH_COOKIE_SECRET: ci-cookie-secret-with-more-than-32-characters
      OPENAI_API_KEY: ci-openai-placeholder
      APP_PUBLIC_URL: https://example.com
      STUDIO_ENCRYPTION_KEY: ci-studio-encryption-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
